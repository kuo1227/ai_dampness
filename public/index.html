<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 去濕體質檢測｜告別濕眠與疲憊</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700;900&family=Noto+Sans+TC:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans TC',sans-serif;background:#0a0f1e;color:#e8f4f0;min-height:100vh;overflow-x:hidden}
.hero{background:linear-gradient(135deg,#0a0f1e 0%,#0d2137 50%,#0a1a2e 100%);padding:50px 20px 40px;text-align:center;border-bottom:1px solid rgba(0,255,180,0.15)}
.hero-badge{display:inline-block;padding:8px 20px;border:1px solid #00ffb4;border-radius:20px;color:#00ffb4;font-size:14px;letter-spacing:2px;margin-bottom:24px}
.hero h1{font-family:'Noto Serif TC',serif;font-size:clamp(26px,7vw,40px);font-weight:900;line-height:1.4;margin-bottom:16px;background:linear-gradient(135deg,#fff 0%,#00ffb4 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hero p{color:#9bb8c8;font-size:16px;line-height:1.8;max-width:500px;margin:0 auto 32px}
.pain-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;max-width:480px;margin:0 auto 32px}
.pain-item{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:16px;font-size:15px;color:#aac8d8;text-align:left;line-height:1.5}
.pain-item span{display:block;font-size:24px;margin-bottom:8px}
.start-btn{background:linear-gradient(135deg,#00c853,#00ffb4);color:#0a0f1e;font-family:'Noto Serif TC',serif;font-size:19px;font-weight:900;border:none;border-radius:16px;padding:18px 40px;cursor:pointer;transition:all 0.3s;letter-spacing:1px;box-shadow:0 0 30px rgba(0,200,83,0.4);width:100%;max-width:320px}
.start-btn:hover{transform:translateY(-2px);box-shadow:0 0 40px rgba(0,200,83,0.6)}

/* Quiz Section */
.quiz-section{display:none;max-width:600px;margin:0 auto;padding:30px 20px 60px}
.history-wrap{margin-bottom:24px}
.history-item{margin-bottom:16px;font-size:15px;line-height:1.6;color:#6a8899;background:rgba(255,255,255,0.02);padding:14px 18px;border-radius:12px;border-left:4px solid rgba(0,255,180,0.3)}
.history-item strong{color:#9bb8c8;display:block;margin-bottom:6px;font-size:16px}
.history-item .ans{color:#00ffb4;font-weight:500}

.question-card{background:rgba(255,255,255,0.05);border:1px solid rgba(0,255,180,0.15);border-radius:24px;padding:32px 24px;margin-bottom:24px;transition:all 0.3s}
.q-num{font-size:14px;color:#00ffb4;letter-spacing:2px;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center}
.pulse-dot{width:8px;height:8px;background:#00ffb4;border-radius:50%;display:inline-block;animation:pulse 1.5s infinite}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(0,255,180,0.7)}70%{box-shadow:0 0 0 8px rgba(0,255,180,0)}100%{box-shadow:0 0 0 0 rgba(0,255,180,0)}}

.q-text{font-family:'Noto Serif TC',serif;font-size:22px;font-weight:700;line-height:1.6;margin-bottom:28px;color:#fff}
.options{display:grid;gap:16px}
.opt{background:rgba(255,255,255,0.04);border:1.5px solid rgba(255,255,255,0.12);border-radius:16px;padding:18px 20px;cursor:pointer;transition:all 0.25s;font-size:18px;color:#cce0e8;text-align:left;line-height:1.5}
.opt:hover{border-color:#00c853;background:rgba(0,200,83,0.08);color:#fff;transform:translateX(6px)}

.ai-loading{display:none;text-align:center;padding:50px 20px;color:#00ffb4;font-size:16px;letter-spacing:1px;line-height:1.6}
.loader{width:40px;height:40px;border:3px solid rgba(0,255,180,0.2);border-top-color:#00ffb4;border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}

/* Result Section */
.result-section{display:none;max-width:600px;margin:0 auto;padding:30px 20px 60px}
.result-type-card{background:linear-gradient(135deg,rgba(0,200,83,0.1),rgba(0,255,180,0.05));border:1px solid rgba(0,255,180,0.3);border-radius:24px;padding:36px 24px;text-align:center;margin-bottom:24px}
.result-label{font-size:14px;color:#00ffb4;letter-spacing:3px;margin-bottom:16px;font-weight:bold}
.result-type{font-family:'Noto Serif TC',serif;font-size:38px;font-weight:900;color:#fff;margin-bottom:12px}
.result-sub{font-size:16px;color:#9bb8c8;line-height:1.7}

.analysis-card{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);border-radius:20px;padding:28px;margin-bottom:20px;font-size:16px;line-height:1.8;color:#cce0e8}
.analysis-card h3{font-family:'Noto Serif TC',serif;color:#00ffb4;font-size:20px;margin:32px 0 20px;border-bottom:1px solid rgba(0,255,180,0.2);padding-bottom:10px;display:flex;align-items:center}
.analysis-card h3:first-child{margin-top:0}

/* Structured Report Styles */
.styled-list{padding-left:0;list-style:none;margin-bottom:24px}
.styled-list li{position:relative;padding-left:24px;margin-bottom:14px;color:#cce0e8}
.styled-list li::before{content:'•';position:absolute;left:4px;top:-2px;color:#00ffb4;font-weight:bold;font-size:22px;line-height:1.4}

.action-grid{display:grid;gap:16px;margin-bottom:28px}
.action-card{background:rgba(0,255,180,0.05);border:1px solid rgba(0,255,180,0.15);border-radius:16px;padding:20px}
.action-card .badge{display:inline-block;background:#00c853;color:#fff;padding:6px 12px;border-radius:8px;font-size:14px;font-weight:bold;margin-bottom:10px;letter-spacing:1px}
.action-card .desc{font-size:16px;line-height:1.6;color:#fff}

.timeline{margin-bottom:24px}
.tl-item{position:relative;padding-left:28px;margin-bottom:20px;border-left:2px dashed rgba(0,255,180,0.3);padding-bottom:12px;color:#cce0e8}
.tl-item::before{content:'';position:absolute;left:-6px;top:6px;width:10px;height:10px;background:#00ffb4;border-radius:50%;box-shadow:0 0 10px rgba(0,255,180,0.5)}
.tl-item:last-child{border-left:2px solid transparent;margin-bottom:0;padding-bottom:0}

.lead-card{background:linear-gradient(135deg,rgba(0,200,83,0.08),rgba(0,100,200,0.08));border:1px solid rgba(0,255,180,0.25);border-radius:24px;padding:32px 24px;margin-top:32px;text-align:center}
.lead-card h2{font-family:'Noto Serif TC',serif;font-size:22px;color:#fff;margin-bottom:12px}
.lead-card p{font-size:16px;color:#9bb8c8;margin-bottom:24px;line-height:1.6}
.lead-form{display:grid;gap:16px}
.lead-form input{background:rgba(255,255,255,0.06);border:1.5px solid rgba(255,255,255,0.15);border-radius:12px;padding:16px;font-size:16px;color:#fff;font-family:'Noto Sans TC',sans-serif;outline:none}
.lead-form input::placeholder{color:#5a7888}
.lead-form input:focus{border-color:#00c853}
.submit-btn{background:linear-gradient(135deg,#00c853,#00a040);color:#fff;font-family:'Noto Serif TC',serif;font-size:18px;font-weight:900;border:none;border-radius:12px;padding:18px;cursor:pointer;box-shadow:0 4px 20px rgba(0,200,83,0.35);transition:all 0.3s;letter-spacing:1px}
.submit-btn:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(0,200,83,0.5)}
.success-msg{display:none;color:#00ffb4;font-size:16px;margin-top:16px}
</style>
</head>
<body>

<!-- Hero -->
<div class="hero" id="heroSection">
  <div class="hero-badge">🤖 AI 動態問診系統</div>
  <h1>身體濕氣重？<br>告別『濕』眠與疲憊！</h1>
  <p>模擬真實中醫問診，AI 根據您的回答動態追問，精準鎖定體質分型，給予客製化祛濕方案。</p>
  <div class="pain-grid">
    <div class="pain-item"><span>😴</span>睡醒仍感疲憊沉重</div>
    <div class="pain-item"><span>💧</span>早起臉部水腫</div>
    <div class="pain-item"><span>🫦</span>舌苔厚膩、口苦</div>
    <div class="pain-item"><span>🍜</span>試遍紅豆薏米沒效</div>
  </div>
  <button class="start-btn" id="startBtn" onclick="startQuiz()">開始 AI 智能問診 →</button>
</div>

<!-- Quiz -->
<div class="quiz-section" id="quizSection">
  <div class="history-wrap" id="historyWrap"></div>
  
  <div class="ai-loading" id="aiLoading">
    <div class="loader"></div>
    <div id="loadingText">中醫師 AI 正在啟動問診引擎...</div>
  </div>

  <div class="question-card" id="currentQuestionCard" style="display:none;">
    <div class="q-num">
      <span id="qNumText">AI 問診中 - 第 1 題</span>
      <span class="pulse-dot"></span>
    </div>
    <div class="q-text" id="qText"></div>
    <div class="options" id="qOptions"></div>
  </div>
</div>

<!-- Result -->
<div class="result-section" id="resultSection">
  <div class="result-type-card">
    <div class="result-label">✦ 最終體質診斷 ✦</div>
    <div class="result-type" id="resultType">分析中...</div>
    <div class="result-sub" id="resultSub"></div>
  </div>
  <div class="analysis-card" id="analysisCard"></div>
  
  <div class="lead-card">
    <h2>領取您的專屬 21 天祛濕計畫 📋</h2>
    <p>輸入資訊，立即獲得針對您體質設計的完整調理方案</p>
    <div class="lead-form">
      <input type="text" id="leadName" placeholder="您的姓名">
      <input type="email" id="leadEmail" placeholder="Email（接收計畫）">
      <input type="tel" id="leadPhone" placeholder="手機號碼（選填）">
      <button class="submit-btn" onclick="submitLead()">立即領取我的 21 天計畫 →</button>
    </div>
    <div class="success-msg" id="successMsg">✓ 已成功送出！請查收您的 Email 📬</div>
  </div>
</div>

<script>
let qaHistory = [];
let currentQuestion = "";

function startQuiz() {
  document.getElementById('heroSection').style.display = 'none';
  document.getElementById('quizSection').style.display = 'block';
  fetchNextQuestion();
}

async function fetchNextQuestion() {
  document.getElementById('currentQuestionCard').style.display = 'none';
  document.getElementById('aiLoading').style.display = 'block';
  
  if(qaHistory.length > 0) {
    document.getElementById('loadingText').textContent = "中醫師 AI 正在根據您的回答進行辯證...";
  }

  try {
    const res = await fetch('/api/dampness-chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ qa_history: qaHistory })
    });
    
    if(!res.ok) throw new Error('Network response was not ok');
    
    const data = await res.json();
    if(data.error) throw new Error(data.error);
    
    if (data.is_final && data.diagnosis) {
      showResult(data.diagnosis);
    } else if (data.question && data.options) {
      renderQuestion(data.question, data.options);
    } else {
      throw new Error('Invalid format from AI');
    }
  } catch (e) {
    console.error(e);
    alert('AI 分析暫時遇到連線問題，請重新整理頁面再試一次。');
    document.getElementById('aiLoading').style.display = 'none';
    document.getElementById('currentQuestionCard').style.display = 'block'; // 可讓用戶重試
  }
}

function renderQuestion(q, opts) {
  document.getElementById('aiLoading').style.display = 'none';
  document.getElementById('currentQuestionCard').style.display = 'block';
  
  currentQuestion = q;
  document.getElementById('qNumText').textContent = `AI 深度問診中 - 第 ${qaHistory.length + 1} 題 / 共 10 題`;
  document.getElementById('qText').textContent = q;
  
  const optionsHtml = opts.map(o => 
    `<button class="opt" onclick="selectOpt('${o.replace(/'/g,"\\'")}')">${o}</button>`
  ).join('');
  
  document.getElementById('qOptions').innerHTML = optionsHtml;
}

function selectOpt(ans) {
  // Add to history UI
  const historyWrap = document.getElementById('historyWrap');
  historyWrap.innerHTML += `
    <div class="history-item">
      <strong>Q: ${currentQuestion}</strong>
      <span>您的回答：<span class="ans">${ans}</span></span>
    </div>
  `;
  
  // scroll to bottom of quiz
  window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });

  // Update state and fetch next
  qaHistory.push({ q: currentQuestion, a: ans });
  fetchNextQuestion();
}

function showResult(diag) {
  document.getElementById('quizSection').style.display = 'none';
  document.getElementById('resultSection').style.display = 'block';

  document.getElementById('resultType').textContent = diag.type || '混合型';
  
  // 處理判斷依據 (如果沒有給 reason 陣列，給一個預設文字)
  document.getElementById('resultSub').textContent = '根據您的回答，我們的 AI 中醫師已經完成了綜合辨證。';

  let html = '';
  
  if (diag.reason) {
    html += `<h3>📌 體質分析依據</h3>`;
    if (Array.isArray(diag.reason)) {
      html += `<ul class="styled-list">${diag.reason.map(i => `<li>${i}</li>`).join('')}</ul>`;
    } else {
      html += `<p style="margin-bottom:20px">${diag.reason}</p>`;
    }
  }

  if (diag.core_issues && diag.core_issues.length > 0) {
    html += `<h3>⚠️ 目前核心問題</h3><ul class="styled-list">${diag.core_issues.map(i => `<li>${i}</li>`).join('')}</ul>`;
  }

  if (diag.action_plan && diag.action_plan.length > 0) {
    html += `<h3>⚡ 本週立即行動</h3><div class="action-grid">`;
    diag.action_plan.forEach(item => {
      if (typeof item === 'object' && item.category) {
        html += `<div class="action-card"><div class="badge">${item.category}</div><div class="desc">${item.content}</div></div>`;
      } else {
        html += `<div class="action-card"><div class="desc">${item}</div></div>`; // Fallback
      }
    });
    html += `</div>`;
  }

  if (diag.long_term) {
    html += `<h3>🗓️ 21天調理地圖</h3>`;
    if (Array.isArray(diag.long_term)) {
      html += `<div class="timeline">${diag.long_term.map(i => `<div class="tl-item">${i}</div>`).join('')}</div>`;
    } else {
      html += `<p>${diag.long_term}</p>`;
    }
  }

  document.getElementById('analysisCard').innerHTML = html;
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

async function submitLead() {
  const name = document.getElementById('leadName').value.trim();
  const email = document.getElementById('leadEmail').value.trim();
  const phone = document.getElementById('leadPhone').value.trim();
  if (!name || !email) { alert('請填寫姓名與 Email'); return; }

  try {
    await fetch('/api/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ 
        campaign_id: 'dampness-dynamic', 
        name, email, phone, 
        constitution: document.getElementById('resultType').textContent 
      })
    });
  } catch(e) {}
  document.getElementById('successMsg').style.display = 'block';
  document.querySelector('.submit-btn').style.display = 'none';
}
</script>
</body>
</html>
